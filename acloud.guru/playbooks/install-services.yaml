# install-services.yaml
---
- name: Install services on load balancers
  hosts: loadbalancers
  become: true
  tasks:
    - name: Installing Apache
      ansible.builtin.apt:
        name: apache2
        state: present

    - name: Configure Apache to listen on my custom HTTP port
      ansible.builtin.lineinfile:
        path: /etc/apache2/ports.conf
        regexp: ^Listen 80$
        line: Listen 32780
        validate: /usr/sbin/apache2ctl -f %s -t

    - name: Configure Apache to listen on my custom HTTPS port
      ansible.builtin.replace:
        path: /etc/apache2/ports.conf
        regexp: Listen 443$
        replace: Listen 32743
        validate: /usr/sbin/apache2ctl -f %s -t

    - name: Ensure Apache starts
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true

- name: Install services on web servers
  hosts: webservers
  become: true
  tasks:
    - name: Installing services
      ansible.builtin.apt:
        name:
          - apache2
          - php7.3
        state: present

    - name: Configure Apache to listen on my custom HTTP port
      ansible.builtin.lineinfile:
        path: /etc/apache2/ports.conf
        regexp: ^Listen 80$
        line: Listen 32780
        validate: /usr/sbin/apache2ctl -f %s -t

    - name: Configure Apache to listen on my custom HTTPS port
      ansible.builtin.replace:
        path: /etc/apache2/ports.conf
        regexp: Listen 443$
        replace: Listen 32743
        validate: /usr/sbin/apache2ctl -f %s -t

    - name: Ensure Apache starts
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true
